dependencies {
    // LDLib
    api(forge.ldlib.neoforge) { transitive = false }
    jarJar(forge.ldlib.neoforge)

    // Registrate
    api("com.tterrag.registrate:Registrate:${forge.versions.registrate.get()}")
    jarJar("com.tterrag.registrate:Registrate:${forge.versions.registrate.get()}")

    // Configuration
    api(forge.configuration)
    jarJar(forge.configuration)

    // Create and its dependencies
    compileOnly("com.simibubi.create:create-${libs.versions.minecraftVeryOld.get()}:${forge.versions.createForge.get()}:all") { transitive = false }
    compileOnly forge.flywheel

    // JEI
    compileOnly(forge.jei.common.api) { transitive = false }
    compileOnly(forge.jei.forge.api) { transitive = false }
    compileOnly(forge.jei.forge.impl) { transitive = false }

    // REI
    compileOnly forge.rei.plugin
    compileOnly forge.rei.api
    compileOnly forge.rei.forge

    // EMI
    compileOnlyApi("dev.emi:emi-neoforge:${forge.versions.emi.get()}:api")
    implementation forge.emi

    // TOP
    compileOnly(forge.theoneprobe) { transitive = false }

    // Jade
    compileOnly(forge.jade)

    // Curios
    compileOnly("top.theillusivec4.curios:curios-neoforge:${forge.versions.curios.get()}:api")
    runtimeOnly(forge.curios)

    // AE2
    compileOnly(forge.ae2) { transitive = false }
    compileOnly("curse.maven:ae2wtlib-459929:5217955")

    // KJS
    implementation(forge.kubejs)

    // Shimmer
    compileOnly(forge.shimmer.forge) { transitive = false }
    compileOnly("maven.modrinth:embeddium:1.0.0-beta.1+mc1.21")
    runtimeOnly("maven.modrinth:embeddium:1.0.0-beta.1+mc1.21")
    compileOnly("maven.modrinth:oculus:1.20.1-1.6.9")

    // Xaero's map
    compileOnly(forge.xaerosminimap)
    compileOnly(forge.xaerosworldmap)

    // journeyMap
    compileOnly(forge.journeymap.api)
    compileOnly(forge.journeymap.forge)

    // JAVD
    compileOnly(forge.javd) { transitive = false }

    compileOnly(forge.ftbteams)
    compileOnly(forge.ftblibrary)

    compileOnly(forge.argonauts)
    compileOnly(forge.resourceful)
}
